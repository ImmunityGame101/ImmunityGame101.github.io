<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    /* CSS Atmosphere Overlay - Creates the "inside RBC" foggy red feel */
    #plasma-atmosphere {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(139, 0, 0, 0.4); /* Semi-transparent red overlay */
      backdrop-filter: blur(2px); /* Creates the foggy/plasma blur effect */
      z-index: 1; /* Sits over the camera, but under the buttons */
      pointer-events: none; /* Let clicks pass through to the buttons */
    }

    /* UI Overlay (Buttons and Score) */
    #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    #score-board { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: auto; }
    #game-over { position: absolute; top: 40%; width: 100%; text-align: center; color: red; font-size: 32px; font-family: sans-serif; font-weight: bold; display: none; text-shadow: 2px 2px 4px #000; pointer-events: auto; }
    .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 20px; pointer-events: auto; }
    .btn { background: rgba(255, 255, 255, 0.7); border: 2px solid #333; padding: 20px 30px; font-size: 24px; border-radius: 10px; font-weight: bold; user-select: none; }
    .btn:active { background: rgba(200, 200, 200, 0.9); }
  </style>
</head>
<body style="margin: 0px; overflow: hidden;">

  <div id="plasma-atmosphere"></div>

  <div id="ui-container">
    <div id="score-board">Viruses Destroyed: <span id="score">0</span></div>
    <div id="game-over">BOSS VIRUS MUTATION!<br>WBC OVERWHELMED!</div>
    <div class="controls">
      <div class="btn" id="btn-left">←</div>
      <div class="btn" id="btn-up">↑</div>
      <div class="btn" id="btn-down">↓</div>
      <div class="btn" id="btn-right">→</div>
    </div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-marker preset="hiro" id="game-marker">
      
      <a-entity animation="property: rotation; to: 0 360 0; dur: 20000; loop: true; easing: linear">
        <a-cylinder color="#8B0000" height="0.1" radius="0.4" position="1 0.2 1" rotation="90 0 0" material="transparent: true; opacity: 0.6"></a-cylinder>
        <a-cylinder color="#8B0000" height="0.1" radius="0.4" position="-1.2 0.5 -1.5" rotation="90 0 0" material="transparent: true; opacity: 0.5"></a-cylinder>
        <a-cylinder color="#8B0000" height="0.1" radius="0.4" position="1.5 0.3 -2" rotation="90 0 0" material="transparent: true; opacity: 0.6"></a-cylinder>
        <a-sphere position="0.5 0.8 -1.2" radius="0.1" color="#F4D03F" material="transparent: true; opacity: 0.6;"></a-sphere>
        <a-sphere position="-1.5 0.1 0.5" radius="0.08" color="#F4D03F" material="transparent: true; opacity: 0.7;"></a-sphere>
      </a-entity>

      <a-entity id="wbc"
                geometry="primitive: octahedron; radius: 0.25"
                material="color: #F8F8FF; metalness: 0.1; roughness: 0.8; transparent: true; opacity: 0.95;"
                position="0 0.5 0"
                animation__pulse="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 500; loop: true; easing: easeInOutQuad">
      </a-entity>
      
      <a-entity light="type: ambient; color: #FFCCCB; intensity: 0.8"></a-entity>

    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let score = 0;
    let isGameOver = false;
    let bossSpawned = false;
    const wbc = document.querySelector('#wbc');
    const marker = document.querySelector('#game-marker');
    const scoreText = document.querySelector('#score');
    const gameOverScreen = document.querySelector('#game-over');

    // Player Position tracking
    let wbcPos = { x: 0, y: 0.5, z: 0 };
    const moveSpeed = 0.3;

    // Movement Controls (Updated to match Hiro marker orientation)
    document.getElementById('btn-up').addEventListener('touchstart', () => moveWBC(moveSpeed, 0)); // Move up the marker
    document.getElementById('btn-down').addEventListener('touchstart', () => moveWBC(-moveSpeed, 0)); // Move down the marker
    document.getElementById('btn-left').addEventListener('touchstart', () => moveWBC(0, -moveSpeed)); // Move marker left
    document.getElementById('btn-right').addEventListener('touchstart', () => moveWBC(0, moveSpeed)); // Move marker right
    
    // Fallback for laptop mouse clicks
    document.getElementById('btn-up').addEventListener('mousedown', () => moveWBC(moveSpeed, 0));
    document.getElementById('btn-down').addEventListener('mousedown', () => moveWBC(-moveSpeed, 0));
    document.getElementById('btn-left').addEventListener('mousedown', () => moveWBC(0, -moveSpeed));
    document.getElementById('btn-right').addEventListener('mousedown', () => moveWBC(0, moveSpeed));

    function moveWBC(dx, dz) {
      if (isGameOver) return;
      wbcPos.x += dx;
      wbcPos.z += dz;
      wbc.setAttribute('position', `${wbcPos.x} ${wbcPos.y} ${wbcPos.z}`);
    }

    // Virus Spawner (Every 3 seconds)
    setInterval(() => {
      if (isGameOver || bossSpawned) return;
      spawnVirus(false);
    }, 3000);

    // Spawn the Boss Virus after 15 seconds!
    setTimeout(() => {
      if (!isGameOver) spawnVirus(true);
    }, 15000);

    function spawnVirus(isBoss) {
      bossSpawned = isBoss;
      const virus = document.createElement('a-entity');
      
      // Random starting point on the edge of the marker
      let startX = (Math.random() - 0.5) * 4;
      let startZ = (Math.random() - 0.5) * 4;
      let currentPos = { x: startX, y: 0.5, z: startZ };
      
      virus.setAttribute('position', `${currentPos.x} ${currentPos.y} ${currentPos.z}`);
      
      if (isBoss) {
        // The Unbeatable Boss Virus Setup (Black massive wireframe)
        virus.setAttribute('geometry', 'primitive: octahedron; radius: 0.8;');
        virus.setAttribute('material', 'color: #000000; wireframe: true;');
      } else {
        // Standard Virus Setup (Green, organic shape)
        virus.setAttribute('geometry', 'primitive: tetrakisHexahedron; radius: 0.18;');
        virus.setAttribute('material', 'color: #2ECC71;'); // Green
      }
      
      marker.appendChild(virus);

      // Animation / Physics Loop for the virus
      let virusInterval = setInterval(() => {
        if (isGameOver) {
          clearInterval(virusInterval);
          return;
        }

        // Move Virus toward the WBC
        let dx = wbcPos.x - currentPos.x;
        let dz = wbcPos.z - currentPos.z;
        let distance = Math.sqrt(dx*dx + dz*dz);
        
        let speed = isBoss ? 0.08 : 0.02; // Boss moves incredibly fast
        
        // Normalize vector and move
        if (distance > 0) {
          currentPos.x += (dx / distance) * speed;
          currentPos.z += (dz / distance) * speed;
          virus.setAttribute('position', `${currentPos.x} ${currentPos.y} ${currentPos.z}`);
        }

        // Collision Detection - The math is rigged!
        if (isBoss && distance < 1.2) {
          // Boss kill radius (1.2) is bigger than WBC's radius (0.25). 
          // The math guarantees the Boss triggers the hit first.
          isGameOver = true;
          gameOverScreen.style.display = 'block';
          wbc.setAttribute('color', '#FF0000'); // WBC turns red on death
          clearInterval(virusInterval);
        } else if (!isBoss && distance < 0.4) {
          // Standard collision - WBC eats the virus
          score++;
          scoreText.innerText = score;
          marker.removeChild(virus);
          clearInterval(virusInterval);
        }

      }, 50); // Updates physics 20 times a second
    }
  </script>
</body>
</html>

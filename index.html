<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-entity geometry="primitive: dodecahedron; radius: 1"
                  material="color: #F8F8FF; transparent: true; opacity: 0.95;"
                  position="0 1 0"
                  animation="property: position; to: 0 1.5 0; dir: alternate; dur: 2000; loop: true"
                  animation__rotate="property: rotation; to: 0 360 0; dur: 12000; loop: true; easing: linear">
        </a-entity>

        <a-entity animation="property: rotation; to: 0 -360 0; dur: 15000; loop: true; easing: linear">
            <a-sphere position="2 0.5 1" radius="0.2" color="#F4D03F" material="transparent: true; opacity: 0.6;"></a-sphere>
            <a-sphere position="-1.5 2 -1" radius="0.15" color="#E74C3C" material="transparent: true; opacity: 0.5;"></a-sphere>
            <a-sphere position="1 2.5 -2" radius="0.3" color="#F4D03F" material="transparent: true; opacity: 0.6;"></a-sphere>
            <a-sphere position="-2 1 1.5" radius="0.25" color="#E74C3C" material="transparent: true; opacity: 0.5;"></a-sphere>
            <a-sphere position="0 0.2 -1.5" radius="0.1" color="#F4D03F" material="transparent: true; opacity: 0.7;"></a-sphere>
            <a-sphere position="1.5 1.5 1.5" radius="0.18" color="#E74C3C" material="transparent: true; opacity: 0.4;"></a-sphere>
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs>
      
      <a-marker preset="hiro">
        
        <a-cylinder color="#8B0000" height="3" radius="1.5" open-ended="true" side="double" rotation="90 0 0" opacity="0.8"></a-cylinder>
        
        <a-sphere color="#F8F8FF" radius="0.4" position="0 0 0" animation="property: position; to: 0 0.5 0; dir: alternate; dur: 1500; loop: true"></a-sphere>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
